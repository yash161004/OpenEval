name: 'OpenEval CI/CD'
description: 'Run OpenEval on a suite of agent traces and test cases.'
inputs:
  suite:
    description: 'Path to the test suite directory.'
    required: true
  fail-under:
    description: 'Minimum average metric score (0.0 to 1.0) required to pass.'
    required: false
    default: '0.0'
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install OpenEval
      shell: bash
      run: pip install "${{ github.action_path }}"
    - name: Run OpenEval
      shell: bash
      run: |
        mkdir -p .openeval_results
        openeval run --suite "${{ inputs.suite }}" --output .openeval_results || echo "OpenEval CLI returned non-zero exit code, continuing to threshold check..."
        
        echo "Generating report and evaluating threshold..."
        # Capture exit code and output to a file
        set +e
        openeval report --input .openeval_results --fail-under "${{ inputs.fail-under }}" > openeval_report.md
        EXIT_CODE=$?
        set -e
        
        # Write to step summary
        cat openeval_report.md >> $GITHUB_STEP_SUMMARY
        
        if [ $EXIT_CODE -ne 0 ]; then
            echo "OpenEval failed (either due to errors or score below threshold). Check the step summary for details."
            exit $EXIT_CODE
        fi
